name: augr-vqa
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch>=2.0.0
  - torchvision>=0.15.0
  - pytorch-cuda=11.8  # CUDA toolkit setup for NVIDIA GPUs (like RTX 5060)
  - monai>=1.2.0
  - transformers>=4.30.0
  - pandas>=1.5.0
  - numpy>=1.24.0
  - matplotlib>=3.7.0
  - scipy>=1.10.0
  - scikit-learn>=1.2.0
  - pip:
      - accelerate>=0.20.0
      - gdown>=4.7.0
      - ipywidgets>=8.0.0
      - pypdf>=5.1.0
